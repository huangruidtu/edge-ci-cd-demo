name: CI Pipeline (Layered DevSecOps)

on:
  push:
    branches: [ "dev", "main" ]

  pull_request:
    branches: [ "main" ]

  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ===============================
      # SAST (runs on all branches)
      # ===============================
      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --error-exitcode=1 \
            --std=c++17 \
            --language=c++ \
            --suppress=missingIncludeSystem \
            -i build \
            ./src

      # ===============================
      # DEV stage (SAST only)
      # ===============================
      - name: Dev stage
        if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
        run: echo "Dev pipeline - SAST only"

      # ===============================
      # Build (PR / main / release only)
      # ===============================
      - name: Set up Docker Buildx
        if: github.ref != 'refs/heads/dev' || github.event_name != 'push'
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        if: github.ref != 'refs/heads/dev' || github.event_name != 'push'
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build Docker image
        if: github.ref != 'refs/heads/dev' || github.event_name != 'push'
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            --load \
            -t edge-demo .

      - name: Move cache
        if: github.ref != 'refs/heads/dev' || github.event_name != 'push'
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Tag image (internal)
        if: github.ref != 'refs/heads/dev' || github.event_name != 'push'
        run: docker tag edge-demo edge-demo:${{ github.sha }}

      # ===============================
      # SCA (Trivy FS - dependency scan)
      # ===============================
      - name: Trivy FS scan
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      # ===============================
      # Image Scan (Trivy image scan)
      # ===============================
      - name: Trivy image scan
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: edge-demo:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      # ===============================
      # Release stage (strictest)
      # ===============================
      - name: Configure AWS credentials
        if: github.event_name == 'release'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'release'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image for ECR (release version)
        if: github.event_name == 'release'
        run: |
          docker tag edge-demo:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/edge-demo:${{ github.event.release.tag_name }}

      - name: Push to ECR
        if: github.event_name == 'release'
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/edge-demo:${{ github.event.release.tag_name }}
