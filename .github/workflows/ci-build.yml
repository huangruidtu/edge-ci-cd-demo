name: CI Pipeline (3 Levels)

on:
  push:
    branches: [ "dev", "main" ]

  pull_request:
    branches: [ "main" ]

  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 🧱 Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 🧱 Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🧱 Cache
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-docker-

      # 🧱 Build（所有阶段都会用）
      - name: Build Docker image
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            --load \
            -t edge-demo .

      # 🧱 Move cache
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # 🧱 Tag（统一）
      - name: Tag image
        run: |
          docker tag edge-demo edge-demo:${{ github.sha }}

      # =========================================================
      # 🔥 DEV（只 build，不 scan，不 push）
      # =========================================================
      - name: Dev info
        if: github.ref == 'refs/heads/dev'
        run: echo "Dev stage - fast feedback only"

      # =========================================================
      # 🔥 VALIDATION（PR + main）
      # =========================================================
      - name: Trivy scan (validation)
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: edge-demo:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      # =========================================================
      # 🔥 RELEASE（唯一 push）
      # =========================================================
      - name: Configure AWS credentials
        if: github.event_name == 'release'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'release'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image for ECR
        if: github.event_name == 'release'
        run: |
          docker tag edge-demo:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/edge-demo:${{ github.event.release.tag_name }}

      - name: Push to ECR
        if: github.event_name == 'release'
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/edge-demo:${{ github.event.release.tag_name }}
