name: CI Build

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IS_PR: ${{ github.event_name == 'pull_request' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure project
        run: cmake -S . -B build

      - name: Build project
        run: cmake --build build

      - name: Run executable
        run: ./build/app

      - name: Run strict checks (PR only)
        if: env.IS_PR == 'true'
        run: echo "Running extended checks..."

      - name: Build Docker image
        run: docker build -t edge-demo .

      - name: Tag Docker image with SHA
        run: docker tag edge-demo edge-demo:${{ github.sha }}

      - name: Security scan (placeholder)
        run: echo "Scanning Docker image..."
