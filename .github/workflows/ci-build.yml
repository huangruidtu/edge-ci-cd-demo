name: CI Pipeline (3 Levels)

on:
  push:
    branches: [ "dev", "main" ]

  pull_request:
    branches: [ "main" ]

  release:
    types: [ published ]

jobs:
  sast:
    name: Run cppcheck SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --error-exitcode=1 \
            --std=c++17 \
            --language=c++ \
            --suppress=missingIncludeSystem \
            -i build \
            ./src

  sca:
  name: Run Trivy FS (SCA)
  runs-on: ubuntu-latest
  needs: sast

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    - name: Run Trivy FS scan
      run: |
        trivy fs \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          --no-progress \
          .

  build:
    needs: [sast, sca] 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build Docker image
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            --load \
            -t edge-demo .

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # 👉 内部仍然用 SHA（但不暴露）
      - name: Tag image (internal)
        run: docker tag edge-demo edge-demo:${{ github.sha }}

      # ===============================
      # DEV（轻量）
      # ===============================
      - name: Dev stage
        if: github.ref == 'refs/heads/dev'
        run: echo "Dev pipeline - fast only"

      # ===============================
      # VALIDATION（PR + main）
      # ===============================
      - name: Trivy scan
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: edge-demo:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      # ===============================
      # RELEASE（只用 version tag🔥）
      # ===============================
      - name: Configure AWS credentials
        if: github.event_name == 'release'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'release'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 👉 只使用 release tag（关键改动🔥）
      - name: Tag image for ECR (release version)
        if: github.event_name == 'release'
        run: |
          docker tag edge-demo:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/edge-demo:${{ github.event.release.tag_name }}

      - name: Push to ECR
        if: github.event_name == 'release'
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/edge-demo:${{ github.event.release.tag_name }}
