name: CI Pipeline (Layered DevSecOps)

on:
  push:
    branches: [ "dev", "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: edge-demo
  BINARY_NAME: edge-app
  ARM_BUILD_DIR: build-armv7
  AWS_REGION: eu-north-1
  S3_BUCKET: edge-cicd-demo-artifacts

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ===============================
      # SAST (always run)
      # ===============================
      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --error-exitcode=1 \
            --std=c++17 \
            --language=c++ \
            --suppress=missingIncludeSystem \
            -i build \
            ./

      # ===============================
      # Dev stage (dev branch only)
      # ===============================
      - name: Dev stage
        if: github.ref == 'refs/heads/dev'
        run: echo "Dev pipeline - SAST only"

      # ===============================
      # Build (main / PR / tag)
      # ===============================
      - name: Set up Docker Buildx
        if: github.ref != 'refs/heads/dev'
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        if: github.ref != 'refs/heads/dev'
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build Docker image (internal)
        if: github.ref != 'refs/heads/dev'
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            --load \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Move cache
        if: github.ref != 'refs/heads/dev'
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ===============================
      # Dependency scanning (SCA)
      # ===============================
      - name: Trivy FS scan
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      # ===============================
      # Image scanning
      # ===============================
      - name: Trivy image scan
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  build_armv7_compatible:
    name: Build ARMv7 release artifact
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted, edge-lan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Prepare native build directory
        run: |
          rm -rf build-native
          mkdir -p build-native

      - name: Patch CMake minimum version for legacy compatibility attempt
        run: |
          cp CMakeLists.txt CMakeLists.txt.bak
          sed -i '1s/3.10/2.8.12/' CMakeLists.txt
          head -5 CMakeLists.txt

      - name: Configure ARMv7 build
        run: |
          cmake -S . -B build-native -DCMAKE_BUILD_TYPE=Release

      - name: Build ARMv7 artifact
        run: |
          cmake --build build-native

      - name: Package ARMv7 binary artifact
        run: |
          mkdir -p dist/${{ github.ref_name }}
          cp build-native/app dist/${{ github.ref_name }}/${{ env.BINARY_NAME }}
          chmod +x dist/${{ github.ref_name }}/${{ env.BINARY_NAME }}
          ls -l dist/${{ github.ref_name }}

      - name: Upload ARMv7 binary to S3
        run: |
          aws s3 cp \
            dist/${{ github.ref_name }}/${{ env.BINARY_NAME }} \
            s3://${{ env.S3_BUCKET }}/${{ env.IMAGE_NAME }}/releases/${{ github.ref_name }}/${{ env.BINARY_NAME }}

  deploy_edge:
    name: Deploy versioned binary to edge device
    needs: build_armv7_compatible
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted, edge-lan]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up SSH key for edge deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EDGE_SSH_PRIVATE_KEY }}" > ~/.ssh/edge_cd_deploy_key
          chmod 600 ~/.ssh/edge_cd_deploy_key
          ssh-keyscan -p ${{ secrets.EDGE_PORT }} ${{ secrets.EDGE_HOST }} >> ~/.ssh/known_hosts

      - name: Download versioned binary from S3
        run: |
          mkdir -p dist/${{ github.ref_name }}
          aws s3 cp \
            s3://${{ env.S3_BUCKET }}/${{ env.IMAGE_NAME }}/releases/${{ github.ref_name }}/${{ env.BINARY_NAME }} \
            dist/${{ github.ref_name }}/${{ env.BINARY_NAME }}
          chmod +x dist/${{ github.ref_name }}/${{ env.BINARY_NAME }}

      - name: Copy binary to target device runtime path
        run: |
          scp -i ~/.ssh/edge_cd_deploy_key -P ${{ secrets.EDGE_PORT }} \
            dist/${{ github.ref_name }}/${{ env.BINARY_NAME }} \
            ${{ secrets.EDGE_USER }}@${{ secrets.EDGE_HOST }}:/home/devops/edge-app/current/edge-app.new

      - name: Deploy binary and restart app on target device
        run: |
          ssh -i ~/.ssh/edge_cd_deploy_key -p ${{ secrets.EDGE_PORT }} \
            ${{ secrets.EDGE_USER }}@${{ secrets.EDGE_HOST }} << 'EOF'
            set -e
            chmod +x /home/devops/edge-app/current/edge-app.new
            mv /home/devops/edge-app/current/edge-app.new /home/devops/edge-app/current/edge-app
            chmod +x /home/devops/edge-app/current/edge-app
            cd /home/devops/edge-app/scripts
            ./stop.sh || true
            ./start.sh
          EOF